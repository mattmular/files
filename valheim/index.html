<!DOCTYPE html>
<html>
    <head>
        <title>Valheim Roulette</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div id="sidebar" class="sidebar-closed">
            <label for="bowPercentage" style="white-space: nowrap;">Bow chance</label>
            <p id="bowPercentageNumber" style="display: inline;">50%</p>
            <input id="bowPercentage" type="range" min="0" max="100" value="50"/>

            <label for="magePercentage" style="white-space: nowrap;">Mage chance</label>
            <p id="magePercentageNumber" style="display: inline;">35%</p>
            <input id="magePercentage" type="range" min="0" max="100" value="35"/>

            <label for="mageQuantity" style="white-space: nowrap;">Mage weapons</label>
            <p id="mageQuantityNumber" style="display: inline;">2</p>
            <input id="mageQuantity" type="range" min="1" max="4" value="2"/>
            
        </div>
        <img id="settings-button" src="gear.png" onclick="toggleSidebar()"/>

        <img id="rules" src="book.png" onclick="rulesAlert()"/>
        
        <div id="center">
            <h1>Valheim Roulette</h1>
            <label for="biome">current biome:</label>
            <h2 id="biome"></h2>
        </br>
            <button onClick="randomizeNext()">roll next</button>
            <button onClick="reset()">reset</button>
            <h2 id="randomLoadout"></h2>
        </div>

        <div id="log-window">
            <h1>log</h1>
            <div id="logs"></div>
        </div>
    </body>
</html>

<script>
var currentBiome = 0;
document.getElementById("bowPercentageNumber").innerText = document.getElementById("bowPercentage").value + '%';
document.getElementById("magePercentageNumber").innerText = document.getElementById("magePercentage").value + '%';
document.getElementById("mageQuantityNumber").innerText = document.getElementById("mageQuantity").value;

function randomizeNext() {
    currentBiome = currentBiome + 1;
    if (currentBiome > 7) currentBiome = 7
    document.getElementById("randomLoadout").innerText = getLoadout(currentBiome, 1.0, 2)
}

function getLoadout(biome, bowPercentage, magicWeapons) {
    var bowPercentage = document.getElementById("bowPercentage").value / 100.0;
    var magePercentage = document.getElementById("magePercentage").value / 100.0;
    var mageQuantity = document.getElementById("mageQuantity").value;
    document.getElementById("biome").innerText = biomes[biome].name;
    var loadout = ""
    var mage = false;
    if (biomes[biome].robes.length > 0 && Math.random() < magePercentage) mage = true;
    var bow = false;
    if (biomes[biome].ranged.length > 0 && Math.random() < bowPercentage) bow = true;
    if (mage){
        loadout += fetchRoll(biomes[biome].magic, mageQuantity);
    } else {
        loadout += fetchRoll(biomes[biome].melee, 1);
    }
    if (bow) {
        loadout += fetchRoll(biomes[biome].ranged, 1);
    }
    if (!mage) {
        loadout += fetchRoll(biomes[biome].shield, 1);
        loadout += fetchRoll(biomes[biome].armor, 1);
    } else {
        loadout += fetchRoll(biomes[biome].robes, 1);
    }

    var log = document.createElement("div");
    log.classList.add("log");
    var para = document.createElement("p");
    log.appendChild(para);
    var text = document.createTextNode("Biome: " + biomes[biome].name + "\n" + loadout);
    para.appendChild(text);
    document.getElementById("logs").appendChild(log);

    return loadout;
}  

function fetchRoll(arr, qty) {
    if (qty > 1) {
        var copy = structuredClone(arr);
        var str = "";
        for (i=0;i < qty; i++){
            if (copy.length < 1) break;
            str += copy.splice(Math.floor(Math.random() * copy.length), 1) + "\n"
        }
        return str;
    } else {
        return arr[Math.floor(Math.random() * arr.length)] + "\n"
    }
}

function reset() {
    currentBiome = 0;
    document.getElementById("biome").innerText = "";
    document.getElementById("randomLoadout").innerText = "";
}

var sidebarOpen = true;
function toggleSidebar() {
    if (sidebarOpen) {
        document.getElementById("sidebar").classList.remove("sidebar-open");
        document.getElementById("sidebar").classList.add("sidebar-closed");
        sidebarOpen = false;
    } else {
        document.getElementById("sidebar").classList.add("sidebar-open");
        document.getElementById("sidebar").classList.remove("sidebar-closed");
        sidebarOpen = true;
    }
}

document.getElementById("bowPercentage").addEventListener('input', (event) => {
    document.getElementById("bowPercentageNumber").innerText = event.target.value + '%';
})

document.getElementById("magePercentage").addEventListener('input', (event) => {
    document.getElementById("magePercentageNumber").innerText = event.target.value + '%';
})

document.getElementById("mageQuantity").addEventListener('input', (event) => {
    document.getElementById("mageQuantityNumber").innerText = event.target.value;
})

function rulesAlert() {

}
